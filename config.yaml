# CF Anycast Router
# 只维护几十个种子 IP。程序会围绕种子所在 /24 做局部抽样、学习和升温。

probe_source: 宁波联通
carrier: cu
trace_host: "cloudflare.com"
trace_path: "/cdn-cgi/trace"
probe_port: 443
probe_attempts: 5
probe_timeout_seconds: 3
spike_threshold_ms: 120
spike_multiplier: 2.0
# 可选：指定第三方 traceroute 工具。留空时会自动优先尝试 nexttrace/nxtrace，
# 找不到才回退到系统 tracert。
route_trace_command: ""
route_trace_args: []
max_route_traces_per_cycle: 96
check_interval_seconds: 300
switch_stable_rounds: 3
switch_improvement_percent: 15
fast_switch_loss_rate: 0.03
fast_switch_rtt_multiplier: 2.5
fast_switch_spike_rate: 0.50
drift_penalty: 220
hijack_penalty: 500
quarantine_minutes: 60
# 局部聚类学习参数
sample_step: 4 # .1, .5, .9, .13 ...
seed_cidr_step: 16 # /16 里每隔 16 个 /24 取一个段
seed_preflight_max_per_cycle: 256 # 大段先按 /24 首位探活，例如 172.67.0.1、172.67.1.1
max_seed_segments_per_cycle: 8
max_learned_segments_per_cycle: 16
max_samples_per_segment_per_cycle: 8
promote_min_samples: 6
promote_pop_probability: 0.70
hot_max_per_segment: 8
hot_max_score: 95
preferred_pops: ["HK", "JP", "SG"]
state_path: "data/state.json"
web_port: 19199
cloudflare_dns:
  enabled: true
  zone_id: 0eeabf66d92fe8e4beef91256e60f85d
  zone_name: ziher.eu.org
  token_env: CLOUDFLARE_API_TOKEN
  ttl: 60
  proxied: false
  record_sets:
    - enabled: true
      region: HK
      type: A
      domain: cf-hk.ziher.eu.org
    - enabled: true
      region: US
      type: A
      domain: cf-us.ziher.eu.org
anchor_probes:
  - enabled: true
    region: JP
    name: jp-tokyo-01
    host: ujp1.xn--ghqu5fm27b67w.com
    path: /pq/jp1
    port: 443
    network: ws
    uuid_env: CFAR_VLESS_UUID
    test_host: www.gstatic.com
    test_path: /generate_204
  - enabled: true
    region: SG
    name: sg-01
    host: sgp1.xn--ghq880n3na965a.com
    path: /pq/sg1
    port: 443
    network: ws
    uuid_env: CFAR_VLESS_UUID
    test_host: www.gstatic.com
    test_path: /generate_204
  - enabled: true
    region: HK
    name: hk-01
    host: hk1p1.xn--ghq880n3na965a.com
    path: /pq/hk1
    port: 443
    network: ws
    uuid_env: CFAR_VLESS_UUID
    test_host: www.gstatic.com
    test_path: /generate_204
  - enabled: true
    region: US
    name: us-san-jose-01
    host: usa1s.xn--ghqu5fm27b67w.com
    path: /pq/us1
    port: 443
    network: ws
    uuid_env: CFAR_VLESS_UUID
    test_host: www.gstatic.com
    test_path: /generate_204
seed_ips: []
seed_cidrs:
  - 104.17.144.0/20
  - 104.20.16.0/20
  - 104.20.32.0/20
  - 104.26.0.0/20
  - 172.67.64.0/20
  - 172.67.0.0/16
  - 108.162.198.0/24
outputs:
  - type: "hosts"
    path: "out/hosts"
    domain: "cf-entry.example.com"
  - type: "dnsmasq"
    path: "out/dnsmasq.conf"
    domain: "cf-entry.example.com"
  - type: "adguard_rewrite"
    path: "out/adguard-rewrite.yaml"
    domain: "cf-entry.example.com"
  - type: "smartdns"
    path: "out/smartdns.conf"
    domain: "cf-entry.example.com"
  - type: "coredns"
    path: "out/Corefile"
    domain: "cf-entry.example.com"
  - type: "nginx_stream"
    path: "out/nginx-upstream.conf"
    port: 443
  - type: "clash_provider"
    path: "out/clash-provider.yaml"
    name: "cf-anycast-active"
    domain: "cf-entry.example.com"
    port: 443
    sni: "cf-entry.example.com"
    extra:
      type: "trojan"
      password: "CHANGE_ME"
  - type: "sing_box_outbound"
    path: "out/sing-box-outbound.json"
    name: "cf-anycast-active"
    domain: "cf-entry.example.com"
    port: 443
    sni: "cf-entry.example.com"
    extra:
      type: "trojan"
      password: "CHANGE_ME"
